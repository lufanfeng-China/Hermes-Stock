<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RPS Pool Screener</title>
  <link rel="stylesheet" href="/styles.css">
  <style>
    /* ── Pool Filter Section ─────────────────────────────────── */
    .pool-filter-section {
      background: #161622;
      border-radius: 4px;
      padding: 12px 16px;
      margin-bottom: 12px;
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
    }
    .pool-filter-row {
      display: flex;
      flex-wrap: wrap;
      gap: 12px;
      align-items: center;
      flex: 1;
    }
    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
    }
    .filter-label {
      font-size: 11px;
      color: #888;
      font-family: monospace;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .filter-select {
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      color: #ccccee;
      border-radius: 3px;
      padding: 4px 8px;
      font-size: 12px;
      font-family: monospace;
      cursor: pointer;
    }
    .filter-select:focus {
      outline: none;
      border-color: #4a4a6a;
    }
    .concept-input-wrap {
      position: relative;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    #pool-concept-input {
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      color: #ccccee;
      border-radius: 3px;
      padding: 4px 8px;
      font-size: 12px;
      font-family: monospace;
      width: 220px;
    }
    #pool-concept-input:focus {
      outline: none;
      border-color: #4a4a6a;
    }
    #pool-concept-dropdown {
      position: absolute;
      top: calc(100% + 2px);
      left: 0;
      background: #1e1e2e;
      border: 1px solid #2a2a3a;
      border-radius: 3px;
      max-height: 220px;
      overflow-y: auto;
      z-index: 200;
      display: none;
      min-width: 340px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.4);
    }
    #pool-concept-dropdown.active { display: block; }
    .concept-option {
      padding: 7px 12px;
      font-size: 12px;
      color: #ccccee;
      cursor: pointer;
      font-family: monospace;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .concept-option:hover { background: #2a2a3a; }
    .concept-option.selected { background: #3a3a5a; }
    .concept-tags {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      margin-top: 4px;
    }
    .concept-tag {
      background: #2a2a3a;
      border: 1px solid #4a4a6a;
      border-radius: 3px;
      padding: 2px 6px;
      font-size: 10px;
      color: #aaaacc;
      display: flex;
      align-items: center;
      gap: 4px;
      font-family: monospace;
    }
    .concept-tag-remove {
      cursor: pointer;
      color: #888;
      font-size: 13px;
      line-height: 1;
    }
    .concept-tag-remove:hover { color: #ef5350; }
    #pool-apply-btn {
      background: #2a4a6a;
      border: 1px solid #4a6a9a;
      color: #aaccee;
      border-radius: 3px;
      padding: 5px 14px;
      font-size: 12px;
      font-family: monospace;
      cursor: pointer;
    }
    #pool-apply-btn:hover { background: #3a5a7a; }
    #pool-status {
      font-size: 11px;
      color: #888;
      font-family: monospace;
      margin-left: auto;
      white-space: nowrap;
    }
    .pool-badge {
      background: #2a4a6a;
      color: #aaccee;
      border-radius: 10px;
      padding: 1px 8px;
      font-size: 10px;
      margin-left: 6px;
    }

    /* ── Pool Table Section ─────────────────────────────────── */
    .pool-section { margin-bottom: 16px; }
    .pool-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 10px;
    }
    .pool-section-title {
      font-size: 14px;
      color: #aaaacc;
      font-family: monospace;
    }
    .pool-table-wrap {
      max-height: 380px;
      overflow-y: auto;
      border-radius: 4px;
      border: 1px solid #2a2a3a;
    }
    .pool-table {
      width: 100%;
      border-collapse: collapse;
      font-family: monospace;
      font-size: 12px;
    }
    .pool-table th {
      background: #12121e;
      color: #888;
      padding: 8px 10px;
      text-align: left;
      font-weight: normal;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #2a2a3a;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .pool-table th[data-sort-key] {
      cursor: pointer;
      user-select: none;
    }
    .pool-table th[data-sort-key]:hover {
      color: #ccccee;
    }
    .pool-sort-label {
      display: inline-flex;
      align-items: center;
      gap: 4px;
    }
    .pool-sort-indicator {
      color: #5e647d;
      font-size: 11px;
      line-height: 1;
    }
    .pool-table th.pool-sort-active {
      color: #ccccee;
    }
    .pool-table th.pool-sort-asc .pool-sort-indicator::before {
      content: "↑";
      color: #aaccee;
    }
    .pool-table th.pool-sort-desc .pool-sort-indicator::before {
      content: "↓";
      color: #aaccee;
    }
    .pool-table td {
      padding: 7px 10px;
      border-bottom: 1px solid #1a1a2a;
      color: #ccccee;
    }
    .pool-table tr { cursor: pointer; }
    .pool-table tbody tr:hover td { background: #1e1e2e; }
    .pool-table tbody tr.row-selected td { background: #1a2a3a; }
    .pool-table .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .no-pool-results {
      text-align: center;
      color: #555;
      padding: 40px;
      font-family: monospace;
      font-size: 13px;
    }
    .pool-pagination {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 8px;
      justify-content: flex-end;
    }
    .industry-rps-section { margin-bottom: 16px; }
    .industry-rps-wrap {
      max-height: 320px;
      overflow-y: auto;
      border-radius: 4px;
      border: 1px solid #2a2a3a;
    }
    .industry-rps-table {
      width: 100%;
      border-collapse: collapse;
      font-family: monospace;
      font-size: 12px;
    }
    .industry-rps-table th {
      background: #12121e;
      color: #888;
      padding: 8px 10px;
      text-align: left;
      font-weight: normal;
      text-transform: uppercase;
      font-size: 10px;
      letter-spacing: 0.05em;
      border-bottom: 1px solid #2a2a3a;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .industry-rps-table th[data-sort-key] {
      cursor: pointer;
      user-select: none;
    }
    .industry-rps-table th[data-sort-key]:hover {
      color: #ccccee;
    }
    .industry-rps-table td {
      padding: 7px 10px;
      border-bottom: 1px solid #1a1a2a;
      color: #ccccee;
    }
    .industry-rps-table .num {
      text-align: right;
      font-variant-numeric: tabular-nums;
    }
    .industry-rps-table tbody tr {
      cursor: pointer;
    }
    .industry-rps-table tbody tr:hover td { background: #1e1e2e; }

    /* ── Shared chart section ──────────────────────────────── */
    #pool-chart-section { margin-top: 16px; }
    #pool-chart-section.hidden { display: none; }

    /* ── Concept column in pool table ─────────────────────── */
    .pool-table .industry-cell {
      font-size: 10px;
      max-width: 120px;
      overflow: hidden;
    }
    .pool-industry-primary,
    .pool-industry-secondary {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .pool-industry-primary {
      color: #9aa3c7;
    }
    .pool-industry-secondary {
      color: #778;
    }
  </style>
</head>
<body>
  <main class="app-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">LOCAL QUOTE TERMINAL</p>
        <h1>RPS Pool Screener</h1>
      </div>
      <div class="topbar-actions">
        <a class="nav-link" href="/">Main Dashboard</a>
        <a class="nav-link" href="/stock-screener.html">股票筛选</a>
        <a class="nav-link" href="/realtime-screener.html">实时选股</a>
        <a class="nav-link" href="/industry-heatmap.html">Industry Heatmap</a>
      </div>
    </header>

    <section class="terminal-shell">

      <!-- ── Filter Section ── -->
      <div class="pool-filter-section">
        <div class="pool-filter-row">
          <div class="filter-group">
            <span class="filter-label">申万一级</span>
            <select id="pool-level1" class="filter-select">
              <option value="">全部行业</option>
            </select>
          </div>
          <div class="filter-group">
            <span class="filter-label">申万二级</span>
            <select id="pool-level2" class="filter-select">
              <option value="">全部二级</option>
            </select>
          </div>
          <div class="filter-group concept-input-wrap">
            <span class="filter-label">概念</span>
            <input id="pool-concept-input" type="text" placeholder="输入概念名称搜索" autocomplete="off">
            <div id="pool-concept-dropdown" class="concept-dropdown"></div>
            <div class="concept-tags" id="pool-concept-tags"></div>
          </div>
          <button id="pool-apply-btn" type="button">应用筛选</button>
        </div>
        <span id="pool-status">股票池: —</span>
      </div>

      <!-- ── Pool Table Section ── -->
      <section id="pool-section" class="pool-section hidden">
        <div class="pool-section-header">
          <span class="pool-section-title">股票池结果</span>
          <span id="pool-count-badge" class="pool-badge">0</span>
        </div>
        <div class="pool-table-wrap">
          <table class="pool-table">
            <thead>
              <tr>
                <th>#</th>
                <th>代码</th>
                <th>名称</th>
                <th class="num pool-sort-active pool-sort-desc" data-sort-key="rps_20" data-sort-direction="desc"><span class="pool-sort-label">RPS20<span class="pool-sort-indicator" aria-hidden="true"></span></span></th>
                <th class="num" data-sort-key="rps_50"><span class="pool-sort-label">RPS50<span class="pool-sort-indicator" aria-hidden="true"></span></span></th>
                <th class="num" data-sort-key="rps_120"><span class="pool-sort-label">RPS120<span class="pool-sort-indicator" aria-hidden="true"></span></span></th>
                <th class="num" data-sort-key="rps_250"><span class="pool-sort-label">RPS250<span class="pool-sort-indicator" aria-hidden="true"></span></span></th>
                <th class="num">20日涨幅</th>
                <th>申万行业</th>
              </tr>
            </thead>
            <tbody id="pool-tbody"></tbody>
          </table>
        </div>
        <div class="pool-pagination">
          <button class="page-btn" id="pool-prev" disabled>&#8592; 上一页</button>
          <span class="page-info" id="pool-page-info">1 / 1</span>
          <button class="page-btn" id="pool-next" disabled>下一页 &#8594;</button>
        </div>
      </section>

      <section id="industry-rps-section" class="industry-rps-section hidden">
        <div class="pool-section-header">
          <span class="pool-section-title">二级行业RPS</span>
          <span id="industry-rps-count-badge" class="pool-badge">0</span>
        </div>
        <div class="industry-rps-wrap">
          <table class="industry-rps-table">
            <thead>
              <tr>
                <th>申万一级</th>
                <th>申万二级</th>
                <th class="num">成分股</th>
                <th class="num pool-sort-active pool-sort-desc" data-sort-key="industry_rps_20" data-sort-direction="desc"><span class="pool-sort-label">RPS20<span class="pool-sort-indicator" aria-hidden="true"></span></span></th>
                <th class="num" data-sort-key="industry_rps_50"><span class="pool-sort-label">RPS50<span class="pool-sort-indicator" aria-hidden="true"></span></span></th>
                <th class="num" data-sort-key="industry_rps_120"><span class="pool-sort-label">RPS120<span class="pool-sort-indicator" aria-hidden="true"></span></span></th>
                <th class="num" data-sort-key="industry_rps_250"><span class="pool-sort-label">RPS250<span class="pool-sort-indicator" aria-hidden="true"></span></span></th>
              </tr>
            </thead>
            <tbody id="industry-rps-tbody" data-industry-level2="" data-industry-level1=""></tbody>
          </table>
        </div>
      </section>

      <!-- ── Shared K-line Chart Section ── -->
      <section id="pool-chart-section" class="kline-section terminal-panel hidden">
        <div class="kline-header terminal-panel-header">
          <div>
            <p class="eyebrow">KLINE CHART</p>
            <h2 id="pool-kline-stock-title">—</h2>
          </div>
          <div class="kline-controls">
            <div id="pool-preset-controls" class="zoom-controls" role="group" aria-label="Kline preset windows">
              <button type="button" class="zoom-button" data-preset="20">20D</button>
              <button type="button" class="zoom-button active" data-preset="60">60D</button>
              <button type="button" class="zoom-button" data-preset="120">120D</button>
              <button type="button" class="zoom-button" data-preset="250">250D</button>
              <button type="button" class="zoom-button" data-preset="-1">ALL</button>
            </div>
            <span id="pool-kline-range-label" class="kline-range-label"></span>
          </div>
        </div>
        <div class="kline-chart-wrap">
          <svg id="pool-kline-svg" class="kline-svg"></svg>
        </div>
      </section>

    </section>
  </main>

  <script type="module" src="/rps-pool.js"></script>
</body>
</html>
