<!doctype html>
<html lang="zh">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>股票筛选</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="app-shell stock-screener-shell">
    <header class="topbar">
      <div>
        <p class="eyebrow">STOCK SCREENER TERMINAL</p>
        <h1>股票筛选</h1>
      </div>
      <div class="topbar-actions">
        <a href="/stock-score.html" class="nav-link">财务评分</a>
        <a href="/rps-pool.html" class="nav-link">RPS</a>
        <a href="/relative-valuation.html" class="nav-link">相对估值</a>
      </div>
    </header>

    <section class="search-card stock-screener-filter-card">
      <div class="search-card-header">
        <div>
          <p class="eyebrow">FILTER WORKBENCH</p>
          <h2>筛选条件</h2>
        </div>
        <p id="stock-screener-status" class="search-meta">支持多条件叠加筛选，每页 50 条</p>
      </div>

      <form id="stock-screener-filter-form" class="stock-screener-filter-grid" onsubmit="return false;">
        <label><span>全市场总分</span><input name="min_total_score" type="number" step="0.1" placeholder="≥"></label>
        <label><span>行业内总分</span><input name="min_ind_total_score" type="number" step="0.1" placeholder="≥"></label>
        <label><span>全市场排名</span><input name="max_market_rank" type="number" step="1" placeholder="≤"></label>
        <label><span>二级行业排名</span><input name="max_industry_rank" type="number" step="1" placeholder="≤"></label>

        <label><span>申万一级</span><select id="stock-screener-level1" name="industry_level_1"><option value="">全部</option></select></label>
        <label><span>申万二级</span><select id="stock-screener-level2" name="industry_level_2"><option value="">全部</option></select></label>
        <label><span>行业温度</span><select name="industry_temperature_label"><option value="">全部</option><option>行业偏冷</option><option>行业温和</option><option>行业偏热</option><option>行业过热</option></select></label>
        <label><span>估值分类</span><select name="classification"><option value="">全部</option><option value="A_NORMAL_EARNING">A类 正常盈利</option><option value="B_THIN_PROFIT_DISTORTED">B类 微盈利畸高</option><option value="C_LOSS">C/D 亏损或高风险</option></select></label>
        <label><span>行业内估值位置</span><input name="max_primary_percentile" type="number" step="0.1" placeholder="≤ 百分位"></label>
        <label><span>区间标签</span><select name="valuation_band"><option value="">全部</option><option value="低估区间">低估区间</option><option value="合理偏低">合理偏低</option><option value="合理">合理</option><option value="合理偏高">合理偏高</option><option value="高估区间">高估区间</option><option value="样本不足">样本不足</option><option value="次新股">次新股</option></select></label>

        <label><span>盈利能力</span><input name="min_dim_profitability" type="number" step="0.1" placeholder="≥"></label>
        <label><span>成长能力</span><input name="min_dim_growth" type="number" step="0.1" placeholder="≥"></label>
        <label><span>运营效率</span><input name="min_dim_operating" type="number" step="0.1" placeholder="≥"></label>
        <label><span>现金流质量</span><input name="min_dim_cashflow" type="number" step="0.1" placeholder="≥"></label>
        <label><span>偿债能力</span><input name="min_dim_solvency" type="number" step="0.1" placeholder="≥"></label>
        <label><span>资产质量</span><input name="min_dim_asset_quality" type="number" step="0.1" placeholder="≥"></label>

        <label><span>细分 ROE</span><input name="min_sub_roe_ex" type="number" step="0.1" placeholder="扣非ROE分 ≥"></label>
        <label><span>细分 净利增速</span><input name="min_sub_profit_growth" type="number" step="0.1" placeholder="≥"></label>
        <label><span>细分 自由现金流</span><input name="min_sub_free_cf" type="number" step="0.1" placeholder="≥"></label>
        <label><span>现价</span><input name="max_current_price" type="number" step="0.01" placeholder="≤"></label>

        <label><span>个股RPS20</span><input name="min_rps_20" type="number" step="0.1" placeholder="≥"></label>
        <label><span>个股RPS50</span><input name="min_rps_50" type="number" step="0.1" placeholder="≥"></label>
        <label><span>个股RPS120</span><input name="min_rps_120" type="number" step="0.1" placeholder="≥"></label>
        <label><span>个股RPS250</span><input name="min_rps_250" type="number" step="0.1" placeholder="≥"></label>
        <label><span>二级行业RPS20</span><input name="min_industry_rps_20" type="number" step="0.1" placeholder="≥"></label>
        <label><span>二级行业RPS50</span><input name="min_industry_rps_50" type="number" step="0.1" placeholder="≥"></label>
        <label><span>二级行业RPS120</span><input name="min_industry_rps_120" type="number" step="0.1" placeholder="≥"></label>
        <label><span>二级行业RPS250</span><input name="min_industry_rps_250" type="number" step="0.1" placeholder="≥"></label>

        <div class="stock-screener-filter-actions">
          <button id="stock-screener-apply-btn" type="button">执行筛选</button>
          <button id="stock-screener-reset-btn" type="button" class="nav-link">重置</button>
        </div>
      </form>
    </section>

    <section class="profile-card stock-screener-results-card">
      <div class="search-card-header">
        <div>
          <p class="eyebrow">SCREENED STOCKS</p>
          <h2>筛选结果 <span id="stock-screener-count" class="pool-badge">0</span></h2>
        </div>
        <p id="stock-screener-page-info" class="search-meta">第 1 / 1 页</p>
      </div>
      <div class="stock-screener-results-wrap">
        <table class="sub-table stock-screener-table">
          <thead>
            <tr>
              <th>股票名称</th>
              <th>现价</th>
              <th>PE-TTM</th>
              <th>PS-TTM</th>
              <th>总市值</th>
              <th>全市场排名</th>
              <th>二级排名</th>
              <th>估值分类</th>
              <th>区间标签</th>
              <th>行业内估值位置</th>
              <th>行业温度</th>
              <th>行业维度</th>
              <th>行业内总分</th>
              <th>行业排名</th>
            </tr>
          </thead>
          <tbody id="stock-screener-results-tbody">
            <tr><td colspan="14" class="stock-score-empty-row">设置条件后点击“执行筛选”</td></tr>
          </tbody>
        </table>
      </div>
      <div id="stock-screener-pagination" class="stock-screener-pagination">
        <button id="stock-screener-prev" type="button" class="nav-link">上一页</button>
        <button id="stock-screener-next" type="button" class="nav-link">下一页</button>
      </div>
    </section>

    <section id="stock-screener-kline-section" class="profile-card stock-screener-kline-section" hidden>
      <div class="search-card-header">
        <div>
          <p class="eyebrow">K-LINE DETAIL</p>
          <h2 id="stock-screener-kline-title">点击股票查看K线</h2>
        </div>
        <p class="search-meta">复用 RPS 页面 K线 / RPS20/50/120/250 趋势</p>
      </div>
      <div id="stock-screener-kline-controls" class="stock-screener-kline-controls" role="group" aria-label="K线区间快捷切换">
        <div class="stock-screener-kline-presets">
          <button type="button" class="nav-link active" data-kline-preset="30">30天</button>
          <button type="button" class="nav-link" data-kline-preset="60">60天</button>
          <button type="button" class="nav-link" data-kline-preset="250">250天</button>
          <button type="button" class="nav-link" data-kline-preset="-1">ALL</button>
        </div>
        <div class="stock-screener-kline-meta">
          <span id="stock-screener-kline-range" class="stock-screener-kline-slot">区间：待加载</span>
          <span id="stock-screener-kline-latest" class="stock-screener-kline-slot">最新：待加载</span>
        </div>
      </div>
      <svg id="stock-screener-kline-svg" class="stock-screener-kline-svg" viewBox="0 0 1000 620"></svg>
    </section>
  </main>

  <script type="module" src="/stock-screener.js"></script>
</body>
</html>
